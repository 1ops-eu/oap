services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: oap
      POSTGRES_PASSWORD: oap
      POSTGRES_DB: oap
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oap"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
